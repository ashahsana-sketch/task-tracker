<!DOCTYPE html>
<html>
<head>
    <title id="title">TypeScript Task Tracker</title>
    <script type="module" src="dist/main.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<header id="main-header">
    <h1 id="h1">Loading...</h1>
    <h2 id="h2">Loading...</h2>
    <h2 id="h3"> xbhjzxjsa</h2>
    <hr>
</header>
<div class="page-container">
    <div class="task-controls container">
        <input id="task-input" class="form-control" type="text" placeholder="New task">
        <select id="priority-input" class="form-select">
            <option value="Low" selected>Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button id="a-button" class="btn btn-primary">Save Task</button>
    </div>

    <div id="app">
        <section id="task-grid" class="card-grid"></section>
    </div>

    
</div>
 <div id="cardDisplay" class="container bg-secondary task deletedcard gap-2 m-4"></div>
    <div id="stats" class="container bg-success gap-2 m-4"></div>
<div id="inComplete" class="container bg-info gap-2 m-4"></div>
<div id="HighPriority" class="container bg-primary gap-2 m-4"></div>
</body>
</html>

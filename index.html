<!DOCTYPE html>
<html>
<head>
    <title>TypeScript Task Tracker</title>
    <script type="module" src="dist/dag10.js" defer></script>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="m-3">
<header id="title" class="container-fluid">
    <h1 id="h1">Task Tracker</h1>
    <h2 id="h2"> An application to learn the Typescript</h2>
    <hr>
</header>
    <!-- <div class="task-controls container"> -->
 <div id="app" class="d-flex row col-md-4 border-success ms-3">
        <form id="form-element" >
         <p>Enter the Task name :<input id="task-input"class="form-select border-dark m-3" type="text" placeholder="New task" >  <!--//required minlength="3" maxlength="20" -->
        </p>
        <p>Select the Priority  from drop down menu:</p>
        <select id="priority-input" class="form-select border-dark ms-3">
            <option value="" disabled selected>Select an option</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button type="submit" id="save-task-button" class="btn btn-primary border-dark m-3">Save Task</button>
        <button id="clear-all" class="btn btn-danger m-3">Clear All Tasks</button>
        <p id="empty-message" class="text-muted m-3"></p>
    </form>
    <p id="error-message" class="text-danger"></p>
   </div> 
<section id="tasks-print"></section>
    
       
 <!-- <div id="cardDisplay" class="container bg-secondary task deletedcard gap-2 m-4"></div>-->
<div id="stats" class="container bg-success gap-2 m-4"></div>
<div id="inComplete" class="container bg-info gap-2 m-4"></div>
<div id="HighPriority" class="container bg-primary gap-2 m-4"></div> 
</body>
</html>

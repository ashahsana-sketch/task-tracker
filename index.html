<!DOCTYPE html>
<html>
<head>
    <title id="title">TypeScript Task Tracker</title>
    <script type="module" src="dist/dag10.js" defer></script>
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<header id="main-header">
    <h1 id="h1">Task Tracker</h1>
    <h2 id="h2"> An application to learn the Typescript</h2>
    <hr>
</header>
    <!-- <div class="task-controls container"> -->
        <form>
        <p>Enter the Task name :<input id="task-input"class="form-select" type="text" placeholder="New task"></p>
        <p>Select the Priority  from drop down menu:</p>
        <select id="priority-input" class="form-select">
            <option disabled selected>Select an option</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button id="a-button" class="btn btn-primary form-select m-3">Save Task</button>
    </form>

    <div id="app">
        <section id="task-grid" class="card-grid"></section>
    </div>

 <!-- <div id="cardDisplay" class="container bg-secondary task deletedcard gap-2 m-4"></div>
<div id="stats" class="container bg-success gap-2 m-4"></div>
<div id="inComplete" class="container bg-info gap-2 m-4"></div>
<div id="HighPriority" class="container bg-primary gap-2 m-4"></div> -->
</body>
</html>
